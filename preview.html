  if(!p.name||!p.lat||!p.lng){alert("กรอกชื่อและพิกัดก่อนครับ");return}
  places.push(p); save(); renderAll(); runRoute();
  cName.value=""; cLat.value=""; cLng.value=""; cActivity.value=""; cImage.value=""; cDoc.value=""; cCost.value=500; cTime.value=2;
}

function clearAll(){
  if(confirm("ล้างข้อมูลทั้งหมด?")){places=[]; save(); renderAll(); runRoute();}
}

function runRoute(){
  if(!places.length){summary.innerHTML="ยังไม่มีข้อมูล C";map.innerHTML="ยังไม่มี Route";result.innerHTML="";return}
  const pv=province.value;
  const pp=Number(people.value);
  const d=Number(days.value);
  const b=Number(budget.value);
  const maxTime=d*8;

  let filtered=places.filter(p=>p.province===pv);
  filtered.sort((a,b)=>(Number(a.cost)+Number(a.time)*100)-(Number(b.cost)+Number(b.time)*100));

  let selected=[], totalCost=0, totalTime=0;
  for(const p of filtered){
    const cg=Number(p.cost)*pp;
    if(totalCost+cg<=b && totalTime+Number(p.time)<=maxTime){
      selected.push(p); totalCost+=cg; totalTime+=Number(p.time);
    }
  }

  summary.innerHTML=`<b>จังหวัด:</b> ${pv}<br><b>จำนวนคน:</b> ${pp} คน<br><b>เวลา:</b> ${d} วัน<br><b>งบ:</b> ${b.toLocaleString()} บาท<br><b>ใช้จริง:</b> ${totalCost.toLocaleString()} บาท<br><b>คงเหลือ:</b> ${(b-totalCost).toLocaleString()} บาท<br><b>เวลาใช้:</b> ${totalTime} ชม.<br><b>จำนวนจุด:</b> ${selected.length}`;
  renderMap(selected);
  renderSelected(selected,pp);
}

function renderMap(selected){
  if(!selected.length){map.innerHTML="ไม่พบ Route ในจังหวัดนี้ หรือข้อมูล C ยังไม่มี";return}
  let url="";
  if(selected.length===1){
    url=`https://www.google.com/maps/search/?api=1&query=${selected[0].lat},${selected[0].lng}`;
  } else {
    const origin=`${selected[0].lat},${selected[0].lng}`;
    const destination=`${selected[selected.length-1].lat},${selected[selected.length-1].lng}`;
    const waypoints=selected.slice(1,-1).map(p=>`${p.lat},${p.lng}`).join("|");
    url=`https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${destination}&travelmode=driving`+(waypoints?`&waypoints=${encodeURIComponent(waypoints)}`:"");
  }
  map.innerHTML=`<b>Google Maps Route</b><br>B สร้างเส้นทาง ${selected.length} จุด<br><a href="${url}" target="_blank">เปิดเส้นทางจริงบน Google Maps</a>`;
}

function card(p,i,pp){
  return `<div class="place">${p.image?`<img src="${p.image}" onerror="this.style.display='none'">`:""}<div class="info"><h3>${i+1}. ${p.name}</h3><span class="badge">${p.province}</span><span class="badge">${p.type}</span><p>${p.activity}</p><p class="small">พิกัด: ${p.lat}, ${p.lng}<br>ราคา: ${(Number(p.cost)*(pp||1)).toLocaleString()} บาท | เวลา: ${p.time} ชม.</p>${p.doc?`<p><a href="${p.doc}" target="_blank">📄 เปิดเอกสาร / Google Sheet</a></p>`:""}</div></div>`;
}

function renderAll(){allPlaces.innerHTML=places.map((p,i)=>card(p,i,1)).join("")||"ยังไม่มีข้อมูล C";}
function renderSelected(selected,pp){result.innerHTML=selected.map((p,i)=>card(p,i,pp)).join("")||"ไม่มีจุดที่เข้าเงื่อนไข";}

load();
</script>
</body>
</html>
